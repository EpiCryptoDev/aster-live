name: Aster Bot — Hourly Run

on:
  schedule:
    - cron: '5 * * * *'   # :05 past every hour UTC (after 1H bar closes)
  workflow_dispatch:       # allow manual trigger from GitHub Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write      # needed to commit state files back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot cycle
        env:
          ASTER_API_KEY:    ${{ secrets.ASTER_API_KEY }}
          ASTER_API_SECRET: ${{ secrets.ASTER_API_SECRET }}
          ASTER_BASE_URL:   ${{ secrets.ASTER_BASE_URL }}
          SYMBOL:           BTCUSDT
          LEVERAGE:         "5"
          INITIAL_CAPITAL:  "1000.0"
          PAPER_TRADE:      ${{ secrets.PAPER_TRADE }}
        run: python bot.py

      - name: Commit state back to repo
        run: |
          git config user.name  "aster-bot"
          git config user.email "bot@aster-live"
          git add state/
          git diff --staged --quiet || git commit -m "bot: state $(date -u +%Y-%m-%dT%H:%M)"
          git push
